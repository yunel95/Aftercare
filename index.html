<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시술 후 주의사항</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --ink: #1A1A1A;
    --ink-soft: #5C5C5C;
    --accent: #8B6F5E;
    --accent-light: #E8DDD8;
    --line: #E2DDD9;
    --warn: #C0392B;
    --warn-bg: #FDF3F2;
    --green: #1E7A4A;
    --green-bg: #F0FAF4;
  }

  body {
    background: var(--bg);
    font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 60px;
    font-size: 14px;
  }

  /* ── Lang bar ── */
  .lang-bar {
    background: #1A1A1A;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px 16px;
  }
  .lang-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.55);
    font-size: 12px;
    font-weight: 500;
    padding: 5px 13px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .lang-btn:hover { color:#fff; border-color:rgba(255,255,255,0.6); }
  .lang-btn.active { background:rgba(255,255,255,0.15); color:#fff; border-color:rgba(255,255,255,0.75); }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 20px 20px 15px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-eyebrow { font-size:10px; letter-spacing:0.16em; color:var(--accent); font-weight:500; margin-bottom:4px; }
  .header-title { font-size:19px; font-weight:600; letter-spacing:0.03em; color:var(--ink); }

  /* ── Tab nav ── */
  .tab-nav-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    position: sticky;
    top: 72px;
    z-index: 99;
  }
  .tab-nav-wrap::-webkit-scrollbar { display:none; }
  .tab-nav { display:flex; min-width:max-content; padding:0 14px; }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 12px 14px;
    font-size: 12.5px;
    font-weight: 400;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.02em;
  }
  .tab-btn:hover { color:var(--ink); }
  .tab-btn.active { color:var(--ink); font-weight:600; border-bottom:2px solid var(--accent); }

  /* ── Content ── */
  .content-area { max-width:640px; margin:0 auto; padding:22px 16px 0; }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* ── Panel header ── */
  .panel-header { margin-bottom:16px; }
  .panel-tag {
    display:inline-block;
    background:var(--accent-light);
    color:var(--accent);
    font-size:10px;
    font-weight:500;
    letter-spacing:0.1em;
    padding:3px 9px;
    border-radius:2px;
    margin-bottom:8px;
    text-transform:uppercase;
  }
  .panel-title { font-size:18px; font-weight:600; color:var(--ink); line-height:1.4; margin-bottom:5px; }
  .panel-subtitle { font-size:12.5px; color:var(--ink-soft); line-height:1.65; }

  /* ── Banners ── */
  .warn-banner {
    background: var(--warn-bg);
    border-left: 3px solid var(--warn);
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 12.5px;
    color: var(--warn);
    line-height: 1.65;
  }
  .info-banner {
    background: var(--green-bg);
    border-left: 3px solid var(--green);
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 12.5px;
    color: var(--green);
    line-height: 1.65;
  }

  /* ── Section blocks ── */
  .section-block {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 11px;
    overflow: hidden;
  }
  .section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 15px;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    letter-spacing: 0.03em;
  }
  .section-icon {
    width: 20px; height: 20px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight:700;
    flex-shrink: 0;
  }
  .section-items { padding:10px 15px; list-style:none; }
  .section-items li {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.75;
    padding: 5px 0 5px 14px;
    position: relative;
    border-bottom: 1px solid var(--line);
  }
  .section-items li:last-child { border-bottom:none; }
  .section-items li::before {
    content:'';
    position:absolute;
    left:0; top:13px;
    width:5px; height:5px;
    background:var(--accent-light);
    border:1.5px solid var(--accent);
    border-radius:50%;
  }
  .section-items li strong { color:var(--ink); font-weight:600; }

  /* ── Common notice block ── */
  .common-block {
    background: #F0EDE8;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 11px;
    overflow: hidden;
  }
  .common-block .section-title { background:#E8E4DF; }


  /* ── Lang font overrides ── */
  body.lang-en  { font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; }
  body.lang-ja  { font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif; }
  body.lang-zh-TW { font-family:'PingFang TC','Microsoft JhengHei','MingLiU',sans-serif; }
</style>
</head>
<body class="lang-ko">

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('ko',this)">한국어</button>
  <button class="lang-btn" onclick="setLang('en',this)">English</button>
  <button class="lang-btn" onclick="setLang('zh-CN',this)">简体中文</button>
  <button class="lang-btn" onclick="setLang('zh-TW',this)">繁體中文</button>
  <button class="lang-btn" onclick="setLang('ja',this)">日本語</button>
</div>

<div class="header">
  <div class="header-eyebrow" id="hdr-eyebrow">의료 미용</div>
  <div class="header-title" id="hdr-title">시술 후 주의사항</div>
</div>

<div class="tab-nav-wrap">
  <div class="tab-nav" id="tab-nav"></div>
</div>

<div class="content-area" id="content-area"></div>

<script>

        label:{ ko:'당일', en:'Same Day', 'zh-CN':'当天', 'zh-TW':'當天', ja:'当日' },

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let currentLang = 'ko';
let currentTab  = TABS[0].id;

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function renderHeader() {
  document.getElementById('hdr-eyebrow').textContent = UI[currentLang].eyebrow;
  document.getElementById('hdr-title').textContent   = UI[currentLang].title;
}

function renderTabs() {
  document.getElementById('tab-nav').innerHTML = TABS.map(t => `
    <button class="tab-btn ${t.id === currentTab ? 'active' : ''}" onclick="switchTab('${t.id}')">
      ${t.labels[currentLang]}
    </button>
  `).join('');
}

function renderContent() {
  const lang = currentLang;
  document.getElementById('content-area').innerHTML = TABS.map(t => {
    const c = DATA[t.id];
    const warns = c.warnings.map(w => `<div class="warn-banner">⚠ ${w[lang]}</div>`).join('');
    const infos = (c.infos||[]).map(i => `<div class="info-banner">ℹ ${i[lang]}</div>`).join('');
    const sections = c.sections.map(s => `
      <div class="section-block">
        <div class="section-title"><span class="section-icon">${s.icon}</span>${s.label[lang]}</div>
        <ul class="section-items">${s.items[lang].map(i=>`<li>${i}</li>`).join('')}</ul>
      </div>
    `).join('');
    const commonItems = COMMON.items[lang].map(i=>`<li>${i}</li>`).join('');
    return `
      <div id="panel-${t.id}" class="tab-panel ${t.id===currentTab?'active':''}">
        <div class="panel-header">
          <div class="panel-tag">${c.tag[lang]}</div>
          <div class="panel-title">${c.title[lang]}</div>
          <div class="panel-subtitle">${c.subtitle[lang]}</div>
        </div>
        ${warns}${infos}${sections}
        <div class="common-block">
          <div class="section-title"><span class="section-icon">★</span>${COMMON.label[lang]}</div>
          <ul class="section-items">${commonItems}</ul>
        </div>

      </div>
    `;
  }).join('');
}

function render() {
  renderHeader();
  renderTabs();
  renderContent();
  document.body.className = 'lang-' + currentLang;
}

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function switchTab(id) {
  currentTab = id;
  renderTabs();
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

render();
</script>
